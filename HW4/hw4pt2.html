<body>
<h2 style="font-family: 'Verdana', sans-serif; color: #007acc;" >Animal Collisions in North Carolina</h2>
<h4 style="font-family: 'Verdana', sans-serif; color: #3498db;">County-based animal collision data for North Carolina in 2024</h4>

<table id="mytable">
  <tr>
    <th>County Name</th>
    <th>Date</th>
    <th>Time</th>
    <th>City</th>
  </tr>    
</table>

<script>
    var ac = document.getElementById("mytable");

    // var x = document.getElementById('mytable')
  
    for (var i =0; i <data.features.length; i++){
        var crash = data.features[i].properties;

        var myNewRow = document.createElement('tr');
        var myNewCell1 = document.createElement('td');
        var myNewCell2 = document.createElement('td');
        var myNewCell3 = document.createElement('td');
        var myNewCell4 = document.createElement('td');

        myNewCell1.innerHTML = crash.CountyName;
        myNewCell2.innerHTML = crash.Date;
        myNewCell3.innerHTML = crash.Time;
        myNewCell4.innerHTML = crash.City;

        myNewCell4.className = getClassName(crash.City);

        myNewRow.append(myNewCell1);
        myNewRow.append(myNewCell2);
        myNewRow.append(myNewCell3);
        myNewRow.append(myNewCell4);
        ac.append(myNewRow);
    }

    function getClassName(cityName) {
        if (cityName == "Rural") return 'rural';
        return 'city';
    }


</script>
