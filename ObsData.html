<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Map</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="GeeseData.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #scrolly {
            display: flex;
            width: 100%;
        }
        #graphic {
            position: sticky;
            top: 0;
            width: 60%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        #text {
            width: 40%;
            padding: 40px;
        }
        .step {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            font-size: 20px;
            background: lightblue;
        }
        .leaflet-tile {
            filter: contrast(1.2) saturate(1.3);
        }
</style>
</head>
<body>

<div id="scrolly">

    <div id="graphic">
        <div id="map"></div>
    </div>
    <div id="text">
        <div class="step" data-year="2008">2008: Baseline conditions</div>
        <div class="step" data-year="2013">2013: Early changes</div>
        <div class="step" data-year="2018">2018: Increasing development</div>
        <div class="step" data-year="2023">2023: Recent patterns</div>
    
</div>

<div id="sliderContainer">
    <input type="range" id="dateSlider" min="0" max="3" step="1"
           oninput="moveSlider(this.value)">
    <p id="theDate"></p>
</div>

<script>
var nlcdTiles = {
        2008: 'https://manayiotou.github.io/GEOG456/2008tiles/{z}/{x}/{y}.png',
        2013: 'https://manayiotou.github.io/GEOG456/2013tiles/{z}/{x}/{y}.png',
        2018: 'https://manayiotou.github.io/GEOG456/2018tiles/{z}/{x}/{y}.png',
        2023: 'https://manayiotou.github.io/GEOG456/2023tiles/{z}/{x}/{y}.png'
    };

var nlcdLayer = null;
var heatLayer = null;
var highlightLayer = null;

var map = L.map('map', {
    minZoom: 5,
    maxZoom: 12
}).setView([40.15, -74.75], 9);

map.createPane('nlcdPane');
map.getPane('nlcdPane').style.zIndex = 200;

L.tileLayer("https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", {
    attribution: '&copy; OpenStreetMap contributors',
    subdomains: 'abcd',
    maxZoom: 12,
    minZoom: 5,
}).addTo(map);

function updateMap(selectedYear) {

    // Remove old NLCD
    if (nlcdLayer) {
        map.removeLayer(nlcdLayer);
    }

    // Add NLCD
    nlcdLayer = L.tileLayer(nlcdTiles[selectedYear], {
        pane: 'nlcdPane',
        opacity: 0.6
    }).addTo(map);

    // Remove old heatmap
    if (heatLayer) {
        map.removeLayer(heatLayer);
    }

    // Remove old highlight layer
    if (highlightLayer) {
        map.removeLayer(highlightLayer);
    }

    // Highlight overlay (developed emphasis)
    highlightLayer = L.tileLayer(nlcdTiles[selectedYear], {
        pane: 'nlcdPane',
        opacity: 0.4
    }).addTo(map);

    // Filter data
    var filteredFeatures = geeseObservations.features.filter(function(feature) {
        if (!feature.geometry || !feature.geometry.coordinates) return false;

        var coords = feature.geometry.coordinates;
        if (coords[0] == null || coords[1] == null) return false;

        var year = parseInt(feature.properties.year);
        return year === selectedYear;
    });

    // Build heatmap data
    var heatData = [];

    filteredFeatures.forEach(function(feature) {
        var coords = feature.geometry.coordinates;
        var props = feature.properties;

        var count = parseInt(props.individualCount) || 1;

        // Normalize (important!)
        count = Math.log(count + 1);

        heatData.push([coords[1], coords[0], count]);
    });

    // Create heatmap
    heatLayer = L.heatLayer(heatData, {
        radius: 30,
        blur: 20,
        maxZoom: 12,
        gradient: {
            0.1: 'blue',
            0.3: 'lime',
            0.6: 'orange',
            1.0: 'red'
        }
    });

    heatLayer.addTo(map);
}

// -------------------- SCROLLAMA --------------------

var scroller = scrollama();

scroller.setup({
    step: ".step",
    offset: 0.6
})
.onStepEnter(function(response) {

    var year = parseInt(response.element.dataset.year);

    updateMap(year);
});

// Resize fix
window.addEventListener('resize', scroller.resize);

// -------------------- INITIAL LOAD --------------------

updateMap(2008);

</script>

</body>
</html>
