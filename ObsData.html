<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Map</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    
    <script src="GeeseData.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-image: url('https://www.mcall.com/wp-content/uploads/migration/2021/06/12/GXYS2SGPF5BARD67VMW6FRVL5U.jpg');
            height: 400px;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: black;
            font-size: 40px;
            background-color: rgba(255,255,255,0.7);
            padding: 10px 20px;
            border-radius: 10px;
        }
        
        #map {
            align-items: right;
            width: 50%;
            height: 1200px;
            margin: 20px auto;
        }

        #sliderContainer {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>


<div id="sliderContainer">
    <input type="range" id="dateSlider" min="0" max="3" step="1"
           oninput="moveSlider(this.value)">
    <p id="theDate"></p>
</div>

<div id="map"></div>

<script>
    //  MAP 1 (GEESE) 
var map = L.map('map').setView([40.3, -75.0], 9);

L.tileLayer("https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", {
    attribution: '&copy; OpenStreetMap contributors',
    subdomains: 'abcd',
    maxZoom: 12,
    minZoom: 5,
}).addTo(map);

var gooseIcon = L.icon({
    iconUrl: 'https://www.pngarts.com/files/4/Goose-Transparent-Image.png',
    iconSize: [40, 30],
    iconAnchor: [20, 15]
});

// Main function
function moveSlider(value) {

    // Remove all previous cluster layers
    map.eachLayer(function(layer) {
        if (layer instanceof L.MarkerClusterGroup) {
            map.removeLayer(layer);
        }
    });

    var Years = [2008, 2013, 2018, 2023];
    var selectedYear = Years[value];

    document.getElementById('theDate').innerHTML =
        'Year: ' + selectedYear;

    var countyGroups = {};

    var filteredFeatures = geeseObservations.features.filter(function(feature) {

        if (!feature.geometry || !feature.geometry.coordinates) return false;

        var coords = feature.geometry.coordinates;
        if (coords[0] == null || coords[1] == null) return false;

        var obsYear = parseInt(feature.properties.year);
        return obsYear === selectedYear;
    });

    // Remove old NLCD layer
    if (nlcdLayer) {
        map.removeLayer(nlcdLayer);
    }

    // Add new NLCD layer based on year
    nlcdLayer = L.tileLayer(nlcdTiles[selectedYear], {
        attribution: 'NLCD ' + selectedYear
    });

    nlcdLayer.addTo(map);

    filteredFeatures.forEach(function(feature) {

        var coords = feature.geometry.coordinates;
        var props = feature.properties;

        var county = props.county || props.locality || "Unknown";

        // Create cluster group for county if needed
        if (!countyGroups[county]) {
            countyGroups[county] = L.markerClusterGroup();
        }

        var marker = L.marker(
            [coords[1], coords[0]],
            { icon: gooseIcon }
        );

        marker.bindPopup(
            "<b>County:</b> " + county +
            "<br><b>Year:</b> " + props.year +
            "<br><b>Count:</b> " + (props.individualCount || "N/A")
        );

        countyGroups[county].addLayer(marker);
    });

    // Add all county clusters to map
    for (var county in countyGroups) {
        map.addLayer(countyGroups[county]);
    }
}

// Initialize slider
window.onload = function() {
    document.getElementById('dateSlider').value = 0;
    moveSlider(0);
}

    var nlcdTiles = {
    2008: 'https://manayiotou.github.io/GEOG456/2008tiles/{z}/{x}/{y}.png',
    2013: 'https://manayiotou.github.io/GEOG456/2013tiles/{z}/{x}/{y}.png',
    2018: 'https://manayiotou.github.io/GEOG456/2018tiles/{z}/{x}/{y}.png',
    2023: 'https://manayiotou.github.io/GEOG456/2023tiles/{z}/{x}/{y}.png'
};

    var nlcdLayer = null;

</script>

</body>
</html>
