<script>
// DATA CONFIG
var years = [2008, 2013, 2018, 2023];
var currentYear = 2008;
var currentFiltered = [];

var nlcdTiles = {
    2008: 'https://manayiotou.github.io/GEOG456/FINAL2008/{z}/{x}/{y}.png',
    2013: 'https://manayiotou.github.io/GEOG456/FINAL2013/{z}/{x}/{y}.png',
    2018: 'https://manayiotou.github.io/GEOG456/FINAL2018/{z}/{x}/{y}.png',
    2023: 'https://manayiotou.github.io/GEOG456/FINAL2023/{z}/{x}/{y}.png'
};

var scrollViews = {
    step1: { center: [40.15, -74.65], zoom: 8 },
    step2: { center: [40.7357, -74.1723], zoom: 12 },
    step3: { center: [40.2171, -74.7429], zoom: 12 },
    step4: { center: [39.95, -74.10], zoom: 11 },
    step5: { center: [40.10, -74.55], zoom: 11 }
};

// MAP SETUP
var map = L.map('map').setView([40.15, -74.75], 8.5);

var base = L.tileLayer(
    "https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
    { maxZoom: 15 }
).addTo(map);

map.createPane('nlcdBasePane');
map.getPane('nlcdBasePane').style.zIndex = 340;

map.createPane('nlcdOverlayPane');
map.getPane('nlcdOverlayPane').style.zIndex = 350;

var nlcdBase2008 = null;
var nlcdOverlay = null;
var heatLayer = null;

// LEGEND HELPERS
function formatCountRange(value) {
    return Math.round(value);
}

function updateHeatLegendRaw(rawCounts) {
    if (!rawCounts || rawCounts.length === 0) {
        document.getElementById("lowRange").textContent = "Low: no data";
        document.getElementById("mediumRange").textContent = "Medium: no data";
        document.getElementById("highRange").textContent = "High: no data";
        return;
    }

    var min = Math.min(...rawCounts);
    var max = Math.max(...rawCounts);

    if (min === max) {
        document.getElementById("lowRange").textContent = "Low: " + formatCountRange(min);
        document.getElementById("mediumRange").textContent = "Medium: " + formatCountRange(min);
        document.getElementById("highRange").textContent = "High: " + formatCountRange(max);
        return;
    }

    var interval = (max - min) / 3;

    var lowMin = min;
    var lowMax = min + interval;
    var medMin = lowMax;
    var medMax = min + (interval * 2);
    var highMin = medMax;
    var highMax = max;

    document.getElementById("lowRange").textContent =
        "Low: " + formatCountRange(lowMin) + "–" + formatCountRange(lowMax);

    document.getElementById("mediumRange").textContent =
        "Medium: " + formatCountRange(medMin) + "–" + formatCountRange(medMax);

    document.getElementById("highRange").textContent =
        "High: " + formatCountRange(highMin) + "–" + formatCountRange(highMax);
}

function updateLegendForVisibleArea() {
    if (!currentFiltered || currentFiltered.length === 0) {
        updateHeatLegendRaw([]);
        return;
    }

    var bounds = map.getBounds();

    var visibleCounts = currentFiltered
        .filter(function(f) {
            var c = f.geometry.coordinates;
            return bounds.contains([c[1], c[0]]);
        })
        .map(function(f) {
            return Number(f.properties.individualCount) || 1;
        });

    updateHeatLegendRaw(visibleCounts);
}

// LOAD 2008 BASE ONCE
function loadBase2008() {
    if (!nlcdBase2008) {
        nlcdBase2008 = L.tileLayer(nlcdTiles[2008] + '?v=2008-' + Date.now(), {
            pane: 'nlcdBasePane',
            opacity: 0.6
        }).addTo(map);

        nlcdBase2008.on('tileerror', function(e) {
            console.log("2008 base tile failed:", e.tile.src);
        });
    }
}

// MAP UPDATE
function updateMap(year) {
    currentYear = year;
    document.getElementById("yearLabel").innerHTML = "Year: " + year;

    // always keep 2008 as base
    loadBase2008();

    // remove old overlay
    if (nlcdOverlay) {
        map.removeLayer(nlcdOverlay);
        nlcdOverlay = null;
    }

    // add selected year only if not 2008
    if (year !== 2008) {
        nlcdOverlay = L.tileLayer(nlcdTiles[year] + '?v=' + year + '-' + Date.now(), {
            pane: 'nlcdOverlayPane',
            opacity: 0.6
        }).addTo(map);

        nlcdOverlay.on('tileerror', function(e) {
            console.log("Overlay tile failed:", e.tile.src);
        });
    }

    // remove old heat layer
    if (heatLayer) {
        map.removeLayer(heatLayer);
        heatLayer = null;
    }

    // filter observations for selected year
    currentFiltered = geeseObservations.features.filter(function(f) {
        return parseInt(f.properties.year) === year;
    });

    var heatData = currentFiltered.map(function(f) {
        var c = f.geometry.coordinates;
        var count = Math.log((Number(f.properties.individualCount) || 1) + 1);
        return [c[1], c[0], count];
    });

    heatLayer = L.heatLayer(heatData, {
        radius: 30,
        blur: 20,
        maxZoom: 12,
        gradient: {
            0.4: '#afd4ed',
            0.65: '#6fa4d9',
            1.0: '#8856a7'
        }
    }).addTo(map);

    updateLegendForVisibleArea();

    console.log("Showing year:", year);
}

// SCROLL CONTROL
var scroller = scrollama();

scroller.setup({
    step: ".step",
    offset: 0.6
}).onStepEnter(function(response) {
    var step = response.element.dataset.step;
    var view = scrollViews[step];

    map.flyTo(view.center, view.zoom, {
        duration: 1.5
    });
});

window.addEventListener('resize', function() {
    scroller.resize();
});

// update legend whenever map extent changes
map.on('zoomend moveend', function() {
    updateLegendForVisibleArea();
});

// SLIDER CONTROL
document.getElementById("yearSlider").addEventListener("input", function() {
    var year = years[this.value];
    updateMap(year);
});

// INITIAL LOAD
loadBase2008();
updateMap(2008);
</script>
