<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Map</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
    <script src="https://unpkg.com/scrollama"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="GeeseData.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: navy;
        }
        #scrolly {
            display: flex;
            width: 100%;
        }
        #graphic {
            position: sticky;
            top: 0;
            width: 60%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        #text {
            width: 40%;
            padding: 40px;
        }
        .step {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            font-size: 20px;
            background: lightblue;
        }
        #sliderContainer {
            position: absolute;
            top: 20px;
            left: 54%;
            transform: translateX(-46%);
            padding: 10px;
            text-align: center;
            font-size: 25px;
            background-color: whitesmoke;
            border-radius: 10px;
            border-color: navy;
        }
</style>
</head>
<body>
<div id="scrolly">

    <div id="graphic">
        <div id="map"></div>
    </div>

    <div id="text">
        <div class="step" data-step="step1">Wetland system overview</div>
        <div class="step" data-step="step2">Early development expansion</div>
        <div class="step" data-step="step3">Suburban growth zones</div>
        <div class="step" data-step="step4">Urban intensification</div>
        <div class="step" data-step="step5">Current landscape patterns</div>
    </div>

</div>

<!-- Slider (DATA ONLY) -->
<div id="sliderContainer">
    <input type="range" id="yearSlider" min="0" max="3" step="1" value="0">
    <p id="yearLabel"></p>
</div>

<script>

// DATA CONFIG
var years = [2008, 2013, 2018, 2023];

var nlcdTiles = {
    2008: 'https://manayiotou.github.io/GEOG456/2008tiles/{z}/{x}/{y}.png',
    2013: 'https://manayiotou.github.io/GEOG456/2013tiles/{z}/{x}/{y}.png',
    2018: 'https://manayiotou.github.io/GEOG456/2018tiles/{z}/{x}/{y}.png',
    2023: 'https://manayiotou.github.io/GEOG456/2023tiles/{z}/{x}/{y}.png'
};

var scrollViews = {
    step1: { center: [40.15, -74.75], zoom: 9 },
    step2: { center: [40.35, -74.60], zoom: 10 },
    step3: { center: [40.25, -74.85], zoom: 12 },
    step4: { center: [40.10, -74.90], zoom: 12 },
    step5: { center: [40.05, -74.70], zoom: 12 }
};

// MAP SETUP
var map = L.map('map').setView([40.15, -74.75], 9);

var base = L.tileLayer(
    "https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}",
    { maxZoom: 12 }
).addTo(map);

map.createPane('nlcdPane');
map.getPane('nlcdPane').style.zIndex = 350;

var nlcdLayer = null;
var heatLayer = null;


// Slider Control 
function  updateMap(year) {

    // update label
    document.getElementById("yearLabel").innerHTML = "Year: " + year;

    // remove old layers
    if (nlcdLayer) map.removeLayer(nlcdLayer);
    if (heatLayer) map.removeLayer(heatLayer);

    // NLCD layer
    nlcdLayer = L.tileLayer(nlcdTiles[year], {
        pane: 'nlcdPane',
        opacity: 0.6
    }).addTo(map);

    // filter data
    var filtered = geeseObservations.features.filter(f =>
        parseInt(f.properties.year) === year
    );
    // heatmap data
    var heatData = filtered.map(f => {
        var c = f.geometry.coordinates;
        var count = Math.log((f.properties.individualCount || 1) + 1);
        return [c[1], c[0], count];
    });

    // heat layer
    heatLayer = L.heatLayer([], {
        radius: 30,
        blur: 20,
        maxZoom: 12
    }).addTo(map);
    heatLayer.setLatLngs(heatData);


}

// SCROLL CONTROL (CAMERA ONLY)
var scroller = scrollama();

scroller.setup({
    step: ".step",
    offset: 0.6
}).onStepEnter(function(response) {

    var step = response.element.dataset.step;
    var view = scrollViews[step];

    map.flyTo(view.center, view.zoom, {
        duration: 1.5
    });
});

window.addEventListener('resize', scroller.resize);

// SLIDER CONTROL
document.getElementById("yearSlider").oninput = function () {
    var year = years[this.value];
    updateMap(year);
};

updateMap(2008);

</script>
</body>
</html>
