<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="geeseObservations.js"></script>
</head>
<header style="background-image: url('https://www.mcall.com/wp-content/uploads/migration/2021/06/12/GXYS2SGPF5BARD67VMW6FRVL5U.jpg'); height: 800px; background-size: cover;">
  <h1>Visualizing Canadian Geese Observations in New Jersey</h1>
</header>
<style>
    h1 {
        color: black;
        text-align: center;
        padding-top: 300px;
        font-size: 50px;
    }
</style>
<style>
    #map {
        margin: auto;
        border-color: black;
        border-width: 2px;
        align-items: center;
        width: 80%;
        height: 700px;
    }
    #nlcdMap {
        margin: auto;
        border-color: black;
        border-width: 2px;
        align-items: center;
        width: 80%;
        height: 700px;
    }
</style>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([40.3, -75.0], 7.5);
        L.tileLayer("https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

        var LeafIcon = L.Icon.extend({
            options: {
                iconSize:     [50, 40],
                iconAnchor:   [20, 15],
            }
        })
        var gooseIcon = new LeafIcon({iconUrl: 'https://www.pngarts.com/files/4/Goose-Transparent-Image.png'});
        var markers = L.markerClusterGroup();

        for (var i = 0; i < geeseObservations.features.length; i++) {
            var feature = geeseObservations.features[i];
            var props = feature.properties;

            if (
                props.decimalLatitude == null ||
                props.decimalLongitude == null
            ) {
                continue;
            }

            var species = props.species || "Unknown species";
            var date = props.eventDate || "Unknown date";

            var marker = L.marker(
                [props.decimalLatitude, props.decimalLongitude],
                { icon: gooseIcon }
            );

            marker.bindPopup(
                "<b>Species:</b> " + species +
                "<br><b>Date:</b> " + date
            );

            markers.addLayer(marker);
        }

        map.addLayer(markers);


        var geojson;    
    
        function moveSlider(value) {

        // Remove previous layer if it exists
        if (geojson) {
            map.removeLayer(geojson);
        }

        // Convert slider value (0–11) to month number (1–12)
        var selectedYear = parseInt(value) + 1;
        var Years = [
        "2008", "2013", "2018", "2023"
        ];

        document.getElementById('theDate').innerHTML =
            'Year: ' + Years[value];
        
        // Filter features by selected month
        var filteredFeatures = data.features.filter(function(feature) {

            // Skip features with missing coordinates
            if (props.decimalLatitude == null ||
                props.decimalLongitude == null) {
                return false;
            }

            var obsDate = new Date(feature.properties.Date);
            var obsYear = obsDate.getFullYear() + 1;

            return obsYear === selectedYear;
        });

        // Create layer using filtered data
        geojson = L.geoJson(filteredFeatures, {
            pointToLayer: function(feature, latlng) {

                return L.marker(
                    [props.decimalLatitude, props.decimalLongitude],
                    { icon: gooseIcon }
                );
            }
        });

        map.addLayer(geojson);
    }        

        moveSlider(0) // start the map with the first feature
        window.onload = function() {
        document.getElementById('dateSlider').value = 0;  
    }; // I added this section to make sure that the slider goes back to the first date after refreshing



    
    </script>

    <div id="nlcdMap"></div>
    <script>
        var nlcdMap = L.map('nlcdMap').setView([40.3, -75.0], 7.5);
                 L.tileLayer("https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", {
                     attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                     }).addTo(nlcdMap);
                L.tileLayer('https://manayiotou.github.io/GEOG456/2008tiles/{z}/{x}/{y}.png', {
                    attribution: 'NLCD 2008'
                }
                ).addTo(nlcdMap);
    </script>

</body>
</html>
